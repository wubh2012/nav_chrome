<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>水果导航</title>
  <!-- Google Fonts - Art Deco -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&family=Poiret+One&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/bootstrap-icons.css">
  <link rel="stylesheet" href="css/popup.css">
</head>
<body>
  <!-- 装饰背景 -->
  <div class="artdeco-bg"></div>

  <div class="popup-container">
    <section class="sync-panel" aria-label="同步状态面板">
      <div class="sync-panel-header">
        <div>
          <div class="panel-kicker">同步状态</div>
          <h1 id="sync-status-title">加载中</h1>
        </div>
        <span id="sync-status-dot" class="status-dot info" aria-hidden="true"></span>
      </div>

      <dl class="status-grid">
        <div class="status-row">
          <dt>数据来源</dt>
          <dd id="sync-source">--</dd>
        </div>
        <div class="status-row">
          <dt>上次同步</dt>
          <dd id="sync-last-time">--</dd>
        </div>
        <div class="status-row">
          <dt>自动同步</dt>
          <dd id="sync-auto">--</dd>
        </div>
      </dl>

      <div id="sync-message" class="sync-message">正在读取同步状态...</div>

      <div class="action-row">
        <button id="sync-now-btn" class="primary-action" type="button">
          <i class="bi bi-arrow-repeat"></i>
          <span>立即同步</span>
        </button>
        <button id="refresh-status-btn" class="icon-action" type="button" title="刷新状态" aria-label="刷新状态">
          <i class="bi bi-arrow-clockwise"></i>
        </button>
        <button id="openOptions" class="icon-action" type="button" title="插件设置" aria-label="插件设置">
          <i class="bi bi-gear"></i>
        </button>
      </div>
    </section>
  </div>

  <script src="js/modules/storage.js"></script>
  <script src="js/modules/feishu-api.js"></script>
  <script src="js/modules/theme-manager.js"></script>
  <script src="js/modules/popup-status-core.js"></script>
  <script src="js/popup.js"></script>
</body>
</html>
