<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>水果导航 - 设置</title>
  <link rel="icon" href="img/favicon.ico">
  <!-- Google Fonts - Art Deco -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&family=Poiret+One&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/bootstrap-icons.css">
  <style>
  /* Options page */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: "Inter", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #0b0b0c;
    color: #f4f4f5;
    min-height: 100vh;
    padding: 20px;
    position: relative;
    overflow-x: hidden;
  }

  /* Background */
  .artdeco-bg {
    position: fixed;
    inset: 0;
    background: #0b0b0c;
    z-index: 0;
    overflow: hidden;
  }

  .artdeco-bg::before {
    content: '';
    position: absolute;
    top: -50%;
    left: 50%;
    transform: translateX(-50%);
    width: 200%;
    height: 200%;
    background:
      conic-gradient(from 0deg at 50% 50%,
        transparent 0deg,
        rgba(255, 255, 255, 0.05) 5deg,
        transparent 10deg,
        transparent 30deg,
        rgba(255, 255, 255, 0.05) 35deg,
        transparent 40deg,
        transparent 60deg,
        rgba(255, 255, 255, 0.05) 65deg,
        transparent 70deg,
        transparent 90deg,
        rgba(255, 255, 255, 0.05) 95deg,
        transparent 100deg,
        transparent 120deg,
        rgba(255, 255, 255, 0.05) 125deg,
        transparent 130deg,
        transparent 150deg,
        rgba(255, 255, 255, 0.05) 155deg,
        transparent 160deg,
        transparent 180deg,
        rgba(255, 255, 255, 0.05) 185deg,
        transparent 190deg,
        transparent 210deg,
        rgba(255, 255, 255, 0.05) 215deg,
        transparent 220deg,
        transparent 240deg,
        rgba(255, 255, 255, 0.05) 245deg,
        transparent 250deg,
        transparent 270deg,
        rgba(255, 255, 255, 0.05) 275deg,
        transparent 280deg,
        transparent 300deg,
        rgba(255, 255, 255, 0.05) 305deg,
        transparent 310deg,
        transparent 330deg,
        rgba(255, 255, 255, 0.05) 335deg,
        transparent 340deg,
        transparent 360deg
      );
    opacity: 0.5;
    animation: rotate 180s linear infinite;
  }

  @keyframes rotate {
    from { transform: translateX(-50%) rotate(0deg); }
    to { transform: translateX(-50%) rotate(360deg); }
  }

  .artdeco-bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 50%,
      transparent 0%,
      transparent 40%,
      #0b0b0c 100%);
    pointer-events: none;
  }

  /* Grid overlay */
  .artdeco-grid {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
    background-size: 80px 80px;
    z-index: 0;
    pointer-events: none;
  }

  .container {
    max-width: 1180px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  /* Two-column layout */
  .settings-grid {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 320px;
    gap: 24px;
    align-items: start;
  }

  .primary-cards {
    display: flex;
    flex-direction: column;
    gap: 24px;
    min-width: 0;
  }

  .side-cards {
    display: flex;
    flex-direction: column;
    gap: 24px;
    min-width: 0;
  }

  .link-item:last-child {
    margin-bottom: 0;
  }

  h1 {
    text-align: center;
    margin-bottom: 40px;
    font-family: 'Poiret One', sans-serif;
    font-weight: 400;
    font-size: 28px;
    background: linear-gradient(180deg,
      #ffffff 0%,
      #f2f2f3 40%,
      #b3b3ba 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 0.05em;
    position: relative;
  }

  h1::after {
    content: '';
    position: absolute;
    bottom: -12px;
    left: 50%;
    transform: translateX(-50%);
    width: 60px;
    height: 2px;
    background: linear-gradient(90deg, transparent, #f2f2f3, transparent);
  }

  .card {
    background: rgba(20, 20, 20, 0.8);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 0;
    padding: 28px;
    margin-bottom: 20px;
    position: relative;
  }

  /* Card corner accents */
  .card::before,
  .card::after {
    content: '';
    position: absolute;
    width: 16px;
    height: 16px;
    border: 1px solid rgba(255, 255, 255, 0.16);
    transition: all 0.3s ease;
  }

  .card::before {
    top: 8px;
    left: 8px;
    border-right: none;
    border-bottom: none;
  }

  .card::after {
    bottom: 8px;
    right: 8px;
    border-left: none;
    border-top: none;
  }

  .card:hover::before,
  .card:hover::after {
    border-color: #d4af37;
  }

  .card-title {
    font-family: 'Poiret One', sans-serif;
    font-size: 18px;
    font-weight: 400;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    color: #d4af37;
    letter-spacing: 0.03em;
  }

  .card-title i {
    font-size: 18px;
  }

  .form-group {
    margin-bottom: 22px;
  }

  .form-group label {
    display: block;
    margin-bottom: 10px;
    font-size: 12px;
    font-weight: 500;
    color: #9a9a9a;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .form-group input[type="text"],
  .form-group input[type="password"],
  .form-group input[type="number"],
  .form-group select {
    width: 100%;
    height: 48px;
    padding: 0 16px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 0;
    background: rgba(0, 0, 0, 0.3);
    color: #f5f5f0;
    font-size: 14px;
    outline: none;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .form-group input::placeholder {
    color: #666;
  }

  .form-group input:focus,
  .form-group select:focus {
    border-color: #d4af37;
    box-shadow: 0 0 0 2px rgba(212, 175, 55, 0.15);
  }

  .form-group .hint {
    margin-top: 8px;
    font-size: 12px;
    color: #666;
    letter-spacing: 0.02em;
  }

  .toggle-group {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 0;
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
  }

  .toggle-group:last-child {
    border-bottom: none;
  }

  .toggle-label {
    font-size: 14px;
  }

  .toggle-label div:first-child {
    color: #f5f5f0;
    margin-bottom: 4px;
  }

  .toggle-label .hint {
    font-size: 12px;
    color: #666;
  }

  .toggle-switch {
    position: relative;
    width: 52px;
    height: 28px;
  }

  .toggle-switch input {
    opacity: 0;
    width: 0;
    height: 0;
  }

  .toggle-slider {
    position: absolute;
    cursor: pointer;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background-color: rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255, 255, 255, 0.1);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    border-radius: 0;
  }

  .toggle-slider:before {
    position: absolute;
    content: "";
    height: 20px;
    width: 20px;
    left: 3px;
    bottom: 3px;
    background-color: #9a9a9a;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    border-radius: 0;
  }

  .toggle-switch input:checked + .toggle-slider {
    background-color: rgba(212, 175, 55, 0.3);
    border-color: #d4af37;
  }

  .toggle-switch input:checked + .toggle-slider:before {
    transform: translateX(24px);
    background-color: #d4af37;
  }

  .btn-group {
    display: flex;
    gap: 14px;
    margin-top: 28px;
  }

  .btn {
    flex: 1;
    padding: 14px 20px;
    border: 1px solid;
    border-radius: 0;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    letter-spacing: 0.03em;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn-primary {
    background: #d4af37;
    border-color: #d4af37;
    color: #0a0a0a;
  }

  .btn-primary:hover {
    background: #f4e4bc;
    border-color: #f4e4bc;
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(212, 175, 55, 0.3);
  }

  .btn-primary:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }

  .btn-secondary {
    background: transparent;
    border-color: rgba(255, 255, 255, 0.2);
    color: #f5f5f0;
  }

  .btn-secondary:hover {
    background: rgba(212, 175, 55, 0.1);
    border-color: rgba(212, 175, 55, 0.3);
    color: #d4af37;
  }

  .status-message {
    margin-top: 18px;
    padding: 14px;
    border: 1px solid;
    border-radius: 0;
    font-size: 13px;
    display: none;
  }

  .status-message.show {
    display: block;
  }

  .status-message.success {
    background: rgba(0, 255, 136, 0.05);
    border-color: rgba(0, 255, 136, 0.3);
    color: #00ff88;
  }

  .status-message.error {
    background: rgba(255, 107, 107, 0.05);
    border-color: rgba(255, 107, 107, 0.3);
    color: #ff6b6b;
  }

  .status-message.info {
    background: rgba(212, 175, 55, 0.05);
    border-color: rgba(212, 175, 55, 0.3);
    color: #d4af37;
  }

  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.2), transparent);
    margin: 24px 0;
  }

  .test-mode-notice {
    background: rgba(255, 193, 7, 0.05);
    border: 1px solid rgba(255, 193, 7, 0.2);
    border-radius: 0;
    padding: 14px;
    margin-bottom: 20px;
    font-size: 13px;
    color: #ffc107;
    display: none;
  }

  .test-mode-notice.show {
    display: block;
  }

  .test-mode-notice i {
    margin-right: 8px;
  }

  .link-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid rgba(255, 255, 255, 0.05);
    border-radius: 0;
    margin-bottom: 10px;
    font-size: 13px;
    transition: all 0.3s ease;
  }

  .link-item:hover {
    background: rgba(212, 175, 55, 0.05);
    border-color: rgba(212, 175, 55, 0.2);
  }

  .link-item a {
    color: #d4af37;
    text-decoration: none;
    transition: all 0.3s ease;
  }

  .link-item a:hover {
    color: #f4e4bc;
    text-decoration: underline;
  }

  .link-item i:first-child {
    color: #d4af37;
  }

  .background-section {
    margin-top: 18px;
  }

  .background-section.hidden {
    display: none;
  }

  .form-group input[type="url"],
  .form-group input[type="range"],
  .form-group input[type="file"] {
    width: 100%;
    font-size: 14px;
  }

  .form-group input[type="url"] {
    height: 48px;
    padding: 0 16px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 0;
    background: rgba(0, 0, 0, 0.3);
    color: #f5f5f0;
    outline: none;
  }

  .form-group input[type="file"] {
    padding: 12px 0;
    color: #f5f5f0;
  }

  .mode-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
  }

  .mode-option {
    border: 1px solid rgba(255, 255, 255, 0.1);
    min-height: 96px;
    padding: 16px 14px;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .mode-option:hover,
  .mode-option.active {
    border-color: #d4af37;
    background: rgba(212, 175, 55, 0.08);
  }

  .mode-option input {
    display: none;
  }

  .mode-option-title {
    color: #f5f5f0;
    margin-bottom: 6px;
    font-size: 14px;
  }

  .mode-option-desc,
  .subtle-note {
    color: #8a8a8a;
    font-size: 12px;
    line-height: 1.5;
  }

  .range-row {
    display: grid;
    grid-template-columns: 1fr 56px;
    gap: 12px;
    align-items: center;
  }

  .range-value {
    text-align: right;
    color: #d4af37;
    font-size: 12px;
  }

  .file-meta {
    margin-top: 8px;
    color: #d4af37;
    font-size: 12px;
  }

  @media (max-width: 980px) {
    .container {
      max-width: 100%;
    }

    .settings-grid {
      grid-template-columns: 1fr;
    }
  }

  @media (max-width: 720px) {
    .btn-group {
      flex-direction: column;
    }

    .mode-grid {
      grid-template-columns: 1fr;
    }
  }
  </style>
</head>

<body>
  <!-- Background -->
  <div class="artdeco-bg"></div>
  <div class="artdeco-grid"></div>

  <div class="container">
    <h1>导航插件设置</h1>

    <div class="test-mode-notice" id="test-mode-notice">
      <i class="bi bi-info-circle"></i>
      测试模式已启用，将使用模拟数据。关闭测试模式后可配置飞书连接。
    </div>

    <div class="settings-grid">
      <div class="primary-cards">
        <!-- Feishu config -->
        <div class="card">
          <div class="card-title">
            <i class="bi bi-table"></i>
            飞书多维表格配置
          </div>

          <div class="form-group">
            <label for="app-id">APP_ID *</label>
            <input type="text" id="app-id" placeholder="请输入飞书应用 ID">
            <div class="hint">登录飞书开放平台，在应用凭证中获取</div>
          </div>

          <div class="form-group">
            <label for="app-secret">APP_SECRET *</label>
            <input type="password" id="app-secret" placeholder="请输入飞书应用密钥">
            <div class="hint">请妥善保管，不要泄露给他人</div>
          </div>

          <div class="form-group">
            <label for="app-token">APP_TOKEN (多维表格 Token) *</label>
            <input type="text" id="app-token" placeholder="请输入多维表格 Token">
            <div class="hint">多维表格 URL 中的 app_token 参数</div>
          </div>

          <div class="form-group">
            <label for="table-id">TABLE_ID (表格 ID) *</label>
            <input type="text" id="table-id" placeholder="请输入表格 ID">
            <div class="hint">多维表格 URL 中的表格 ID</div>
          </div>

          <div class="btn-group">
            <button class="btn btn-secondary" id="test-connection-btn">
              <i class="bi bi-plug"></i> 测试连接
            </button>
            <button class="btn btn-primary" id="save-btn">
              <i class="bi bi-check-lg"></i> 保存配置
            </button>
          </div>

          <div class="status-message" id="status-message"></div>
        </div>

        <div class="card">
          <div class="card-title">
            <i class="bi bi-image"></i>
            背景设置
          </div>

          <div class="form-group">
            <label>背景模式</label>
            <div class="mode-grid" id="background-mode-group">
              <label class="mode-option" data-mode="default">
                <input type="radio" name="background-mode" value="default" checked>
                <div class="mode-option-title">默认背景</div>
                <div class="mode-option-desc">保留当前 Art Deco 背景</div>
              </label>
              <label class="mode-option" data-mode="upload">
                <input type="radio" name="background-mode" value="upload">
                <div class="mode-option-title">本地上传</div>
                <div class="mode-option-desc">最稳定，图片保存在浏览器本地</div>
              </label>
              <label class="mode-option" data-mode="url">
                <input type="radio" name="background-mode" value="url">
                <div class="mode-option-title">图片 URL</div>
                <div class="mode-option-desc">适合高级用户使用外部图片链接</div>
              </label>
            </div>
          </div>

          <div class="form-group background-section hidden" id="background-upload-section">
            <label for="background-file">上传图片</label>
            <input type="file" id="background-file" accept="image/*">
            <div class="subtle-note">上传时会自动压缩，默认只保留当前这一张背景图。</div>
            <div class="file-meta" id="background-file-meta">未选择文件</div>
          </div>

          <div class="form-group background-section hidden" id="background-url-section">
            <label for="background-url">图片 URL</label>
            <input type="url" id="background-url" placeholder="https://example.com/background.jpg">
            <div class="subtle-note">请使用可直接访问的图片地址；加载失败会自动回退默认背景。</div>
          </div>

          <div class="form-group">
            <label for="background-size">图片适配</label>
            <select id="background-size">
              <option value="cover">Cover</option>
              <option value="contain">Contain</option>
            </select>
          </div>

          <div class="form-group">
            <label for="background-overlay">遮罩强度</label>
            <div class="range-row">
              <input type="range" id="background-overlay" min="0" max="0.85" step="0.01" value="0.38">
              <div class="range-value" id="background-overlay-value">38%</div>
            </div>
          </div>

          <div class="form-group">
            <label for="background-blur">模糊强度</label>
            <div class="range-row">
              <input type="range" id="background-blur" min="0" max="24" step="1" value="0">
              <div class="range-value" id="background-blur-value">0px</div>
            </div>
          </div>

          <div class="btn-group">
            <button class="btn btn-secondary" id="background-reset-btn">
              <i class="bi bi-arrow-counterclockwise"></i> 恢复默认
            </button>
            <button class="btn btn-primary" id="background-save-btn">
              <i class="bi bi-image"></i> 保存背景
            </button>
          </div>

          <div class="status-message" id="background-status-message"></div>
        </div>

      </div>

      <div class="side-cards">
        <div class="card">
          <div class="card-title">
            <i class="bi bi-bug"></i>
            测试模式
          </div>

          <div class="toggle-group">
            <div class="toggle-label">
              <div>启用测试模式</div>
              <div class="hint">使用模拟数据，无需配置飞书</div>
            </div>
            <label class="toggle-switch">
              <input type="checkbox" id="test-mode-toggle">
              <span class="toggle-slider"></span>
            </label>
          </div>
        </div>

        <div class="card">
          <div class="card-title">
            <i class="bi bi-question-circle"></i>
            配置帮助
          </div>

          <div class="link-item">
            <i class="bi bi-link-45deg"></i>
            <a href="https://open.feishu.cn/" target="_blank">飞书开放平台</a>
          </div>

          <div class="link-item">
            <i class="bi bi-link-45deg"></i>
            <a href="#" id="view-guide-btn">查看配置指南</a>
          </div>

          <div class="link-item">
            <i class="bi bi-github"></i>
            <a href="https://github.com/wubh2012/nav_chrome" target="_blank">GitHub 仓库，欢迎贡献和⭐</a>
          </div>
        </div>

        <!-- Data management -->
        <div class="card">
          <div class="card-title">
            <i class="bi bi-trash"></i>
            数据管理
          </div>

          <div class="btn-group">
            <button class="btn btn-secondary" id="clear-cache-btn">
              <i class="bi bi-trash3"></i> 清除缓存
            </button>
            <button class="btn btn-secondary" id="reset-btn">
              <i class="bi bi-arrow-counterclockwise"></i> 重置所有
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/modules/storage.js"></script>
  <script src="js/modules/background-config.js"></script>
  <script src="js/modules/background-storage.js"></script>
  <script src="js/modules/feishu-api.js"></script>
  <script src="js/options.js"></script>
</body>

</html>
