<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>水果导航</title>

  <script>
    (function() {
      var root = document.documentElement;
      var collapsed = '0';

      try {
        collapsed = window.localStorage.getItem('chromeNav_sidebarCollapsed') === '1' ? '1' : '0';
      } catch (_error) {
        // ignore storage failures during initial paint
      }

      root.dataset.sidebarCollapsed = collapsed;
      root.classList.toggle('sidebar-collapsed', collapsed === '1');
    })();
  </script>

  <style>
    html[data-sidebar-collapsed="1"] .sidebar {
      width: 84px;
      min-width: 84px;
      transition: none !important;
    }

    html[data-sidebar-collapsed="1"] .user-avatar {
      padding: 36px 0 16px;
    }

    html[data-sidebar-collapsed="1"] .user-avatar img,
    html[data-sidebar-collapsed="1"] .user-avatar .logo-svg {
      width: 40px;
      height: 40px;
      transition: none !important;
    }
  </style>

  <!-- Icons -->
  <link rel="icon" href="img/logo-new.svg">
  <link rel="icon" type="image/png" sizes="16x16" href="img/icons/icon-16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="img/icons/icon-32.png">
  <link rel="icon" type="image/png" sizes="48x48" href="img/icons/icon-48.png">
  <link rel="icon" type="image/png" sizes="128x128" href="img/icons/icon-128.png">

  <!-- Google Fonts - Art Deco 字体 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&family=Poiret+One&display=swap" rel="stylesheet">

  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/bootstrap-icons.css">
  <link rel="stylesheet" href="css/style.css">

</head>

<body>
  <!-- Art Deco 背景层 -->
  <div class="artdeco-bg">
    <div class="background-image-layer"></div>
    <div class="background-overlay-layer"></div>
  </div>
  <div class="artdeco-grid"></div>

  <!-- 桌面端主题切换按钮 -->
  <div class="theme-toggle-anchor">
    <div class="theme-shortcut-hint" aria-hidden="true">
      <kbd>Shift</kbd>
      <span>双击或 Ctrl+F 快速搜索</span>
    </div>
    <button id="desktop-theme-toggle-btn" class="theme-toggle-button" title="切换主题">
      <i class="bi bi-moon-fill"></i>
    </button>
  </div>

  <div class="container">
    <!-- 左侧侧边栏 -->
    <aside class="sidebar" id="sidebar">
      <div class="user-avatar">
        <svg class="logo-svg" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
          <style>
            .neon-stroke { stroke: currentColor; fill: none; }
            .neon-fill { fill: currentColor; }
            .bg { fill: var(--bg-primary); }
            .grid-path { stroke: var(--border-dim); fill: none; }
          </style>

          <defs>
            <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
              <path class="grid-path" d="M 50 0 L 0 0 0 50"/>
            </pattern>
            <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
              <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
              <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
              </feMerge>
            </filter>
          </defs>

          <rect class="bg" width="100%" height="100%"/>
          <rect width="100%" height="100%" fill="url(#grid)" opacity="0.5"/>

          <path class="neon-stroke" d="M 200 300 Q 200 500 400 550 Q 600 500 600 300 Q 550 250 650 250 L 700 150 L 600 200 Q 550 250 500 250 Z" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
          <path class="neon-stroke" d="M 250 320 Q 250 480 400 520 Q 550 480 580 350 Q 550 320 500 320 Z" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
          <ellipse class="neon-fill" cx="320" cy="380" rx="15" ry="8" transform="rotate(30 320 380)" filter="url(#glow)"/>
          <ellipse class="neon-fill" cx="370" cy="450" rx="15" ry="8" transform="rotate(30 370 450)" filter="url(#glow)"/>
          <ellipse class="neon-fill" cx="450" cy="480" rx="15" ry="8" transform="rotate(30 450 480)" filter="url(#glow)"/>
          <ellipse class="neon-fill" cx="530" cy="440" rx="15" ry="8" transform="rotate(30 530 440)" filter="url(#glow)"/>
          <path class="neon-stroke" d="M 600 250 L 700 150 L 600 200 Z" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
        </svg>
      </div>
      <nav class="nav-menu">
        <ul id="category-menu">
          <li class="active" data-category="all"><i class="bi bi-house-door"></i> 全部</li>
          <!-- 动态生成的分类菜单项 -->
        </ul>

        <!-- 皮肤选择器 -->
        <div class="skin-selector" id="skin-selector">
          <div class="current-skin">
            <div class="current-skin-preview">
              <i class="bi bi-stars current-skin-icon"></i>
            </div>
            <span class="current-skin-name">石墨中性</span>
            <button class="skin-expand-btn">
              <i class="bi bi-chevron-down"></i>
            </button>
          </div>

          <div class="skin-options">
            <div class="skin-grid">
              <div class="skin-option active" data-skin="graphite">
                <div class="skin-colors">
                  <div class="color-dot primary"></div>
                  <div class="color-dot secondary"></div>
                  <div class="color-dot accent"></div>
                </div>
                <span class="skin-label">石墨中性</span>
              </div>

              <div class="skin-option" data-skin="neon">
                <div class="skin-colors">
                  <div class="color-dot primary"></div>
                  <div class="color-dot secondary"></div>
                  <div class="color-dot accent"></div>
                </div>
                <span class="skin-label">霓虹风格</span>
              </div>

            </div>
          </div>
        </div>

        <!-- 设置入口 -->
        <ul class="settings-menu">
          <li id="open-settings-btn">
            <i class="bi bi-gear"></i>
            <span>设置</span>
          </li>
          <li id="github-link">
            <a href="https://github.com/wubh2012/nav_chrome" target="_blank">
              <i class="bi bi-github"></i>
              <span>GitHub</span>
            </a>
          </li>
        </ul>
      </nav>
    </aside>

    <!-- 主内容区 -->
    <main class="main-content">
      <!-- 顶部信息区 -->
      <header class="top-info">
        <div class="time-info">
          <div class="current-time" id="current-time">--:--:--</div>
          <div class="date-info" id="date-info">加载中...</div>
        </div>
      </header>

      <!-- 添加链接按钮 -->
      <button id="add-link-btn" class="add-link-btn" title="添加网站">
        <i class="bi bi-plus-lg"></i>
      </button>

      <!-- 工具图标列表 -->
      <div class="tools-container">
        <div id="tools-grid" class="tools-grid">
          <!-- 动态生成的工具图标 -->
        </div>
      </div>

      <!-- 同步状态提示 -->
      <div id="sync-status" class="sync-status"></div>
    </main>
  </div>

  <!-- 添加链接模态框 -->
  <div id="add-link-modal" class="modal">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h2>添加网站</h2>
        <button id="close-modal-btn" class="close-modal-btn" aria-label="关闭">
          <i class="bi bi-x"></i>
        </button>
      </div>

      <div class="modal-body">
        <form id="add-link-form">
          <div class="form-group">
            <label for="site-url">网站网址 *</label>
            <input type="url" id="site-url" name="site-url" value="https://" placeholder="请输入完整网址">
            <div class="error-message" id="url-error"></div>
          </div>
          <div class="form-group">
            <label for="site-name">网站名称 *</label>
            <input type="text" id="site-name" name="site-name" placeholder="请输入网站名称" maxlength="50">
            <div class="error-message" id="name-error"></div>
          </div>
          <div class="form-group">
            <label for="site-category">分类 *</label>
            <select id="site-category" name="site-category">
              <!-- 动态生成的分类选项 -->
            </select>
            <div id="custom-category-container" style="display: none; margin-top: 10px;">
              <input type="text" id="custom-category" name="custom-category" placeholder="请输入自定义分类名称" maxlength="20">
            </div>
            <div class="error-message" id="category-error"></div>
          </div>

          <div class="form-group">
            <label for="site-sort">排序 (可选)</label>
            <input type="number" id="site-sort" name="site-sort" placeholder="数字越小，排序越靠前" min="0" max="999" value="200">
          </div>
        </form>
      </div>

      <div class="modal-footer">
        <button id="cancel-add-btn" class="cancel-btn">取消</button>
        <button id="save-link-btn" class="save-btn">保存</button>
      </div>
    </div>
  </div>

  <!-- 删除确认模态框 -->
  <div id="delete-link-modal" class="modal">
    <div class="modal-overlay"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h2>确认删除</h2>
        <button id="close-delete-modal-btn" class="close-modal-btn" aria-label="关闭">
          <i class="bi bi-x"></i>
        </button>
      </div>

      <div class="modal-body">
        <div class="delete-confirmation">
          <div class="delete-icon">
            <i class="bi bi-exclamation-triangle"></i>
          </div>
          <p>确定要删除网站 <span id="delete-site-name" class="site-name-highlight"></span> 吗？</p>
          <p class="delete-warning">此操作不可撤销。</p>
        </div>
      </div>

      <div class="modal-footer">
        <button id="cancel-delete-btn" class="cancel-btn">取消</button>
        <button id="confirm-delete-btn" class="delete-btn">确认删除</button>
      </div>
    </div>
  </div>

  <!-- 快速搜索 -->
  <div id="quick-search-modal" class="quick-search-modal" aria-hidden="true">
    <div id="quick-search-overlay" class="quick-search-overlay"></div>
    <div class="quick-search-panel" role="dialog" aria-modal="true" aria-label="快速搜索网站">
      <div class="quick-search-header">
        <i class="bi bi-search"></i>
        <input
          id="quick-search-input"
          class="quick-search-input"
          type="text"
          placeholder="输入名称、网址或分类进行搜索"
          autocomplete="off"
          spellcheck="false"
          aria-label="网站快速搜索输入框"
        >
      </div>
      <div class="quick-search-hint">Shift 双击 / Ctrl+F 唤起，↑/↓ 切换，Enter 打开，Esc 关闭</div>
      <ul id="quick-search-list" class="quick-search-list" role="listbox"></ul>
      <div id="quick-search-empty" class="quick-search-empty">没有匹配的网站</div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="lib/lunar.js"></script>
  <script src="js/modules/storage.js"></script>
  <script src="js/modules/background-config.js"></script>
  <script src="js/modules/background-storage.js"></script>
  <script src="js/modules/feishu-api.js"></script>
  <script src="js/modules/background-manager.js"></script>
  <script src="js/modules/theme-manager.js"></script>
  <script src="js/modules/ui-renderer.js"></script>
  <script src="js/modules/link-manager.js"></script>
  <script src="js/modules/drag-sort-manager.js"></script>
  <script src="js/modules/sync-manager.js"></script>
  <script src="js/modules/quick-search-manager.js"></script>
  <script src="js/app.js"></script>
</body>

</html>
