<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>水果导航 - 设置</title>
  <link rel="icon" href="img/favicon.ico">
  <!-- Google Fonts - Art Deco -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&family=Poiret+One&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/bootstrap-icons.css">
  <style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    --page-bg: #f7f2e8;
    --surface-1: rgba(251, 247, 239, 0.9);
    --surface-2: rgba(245, 239, 228, 0.92);
    --surface-3: rgba(237, 229, 214, 0.96);
    --surface-raised: #fbf7ef;
    --surface-input: rgba(255, 252, 246, 0.94);
    --text-primary: #40362f;
    --text-secondary: #6e6258;
    --text-muted: #a79a8d;
    --accent-primary: #c9962a;
    --accent-soft: #e0bf7a;
    --accent-strong: #a9751b;
    --accent-dim: rgba(201, 150, 42, 0.14);
    --selected-bg: rgba(111, 139, 61, 0.16);
    --selected-text: #4b5d29;
    --selected-border: rgba(111, 139, 61, 0.24);
    --border-soft-color: rgba(120, 96, 62, 0.14);
    --border-strong-color: rgba(120, 96, 62, 0.24);
    --shadow-soft: 0 10px 30px rgba(120, 93, 57, 0.08);
    --shadow-float: 0 18px 36px rgba(120, 93, 57, 0.12);
    --success-soft: rgba(111, 139, 61, 0.14);
    --success-text: #5b7330;
    --error-soft: rgba(186, 94, 71, 0.14);
    --error-text: #a24f3b;
    --info-soft: rgba(201, 150, 42, 0.12);
    --info-text: #8f6b1d;
  }

  body {
    font-family: "Noto Sans SC", "Josefin Sans", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--page-bg);
    color: var(--text-primary);
    min-height: 100vh;
    padding: 28px 20px 40px;
    position: relative;
    overflow-x: hidden;
  }

  .artdeco-bg {
    position: fixed;
    inset: 0;
    background:
      radial-gradient(circle at top left, color-mix(in srgb, var(--accent-primary) 10%, transparent) 0%, transparent 38%),
      linear-gradient(180deg, color-mix(in srgb, var(--page-bg) 94%, white 6%), var(--page-bg));
    z-index: 0;
    overflow: hidden;
  }

  .artdeco-bg::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 18% 14%, color-mix(in srgb, var(--accent-primary) 8%, transparent) 0%, transparent 18%),
      radial-gradient(circle at 82% 20%, color-mix(in srgb, var(--selected-bg) 60%, transparent) 0%, transparent 20%);
    opacity: 0.85;
  }

  .artdeco-grid {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(120, 96, 62, 0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(120, 96, 62, 0.05) 1px, transparent 1px);
    background-size: 72px 72px;
    z-index: 0;
    pointer-events: none;
    opacity: 0.5;
  }

  .container {
    max-width: 1180px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  .settings-grid {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 320px;
    gap: 24px;
    align-items: start;
  }

  .primary-cards,
  .side-cards {
    display: flex;
    flex-direction: column;
    gap: 24px;
    min-width: 0;
  }

  .link-item:last-child,
  .card:last-child {
    margin-bottom: 0;
  }

  h1 {
    text-align: center;
    margin-bottom: 40px;
    font-family: 'Josefin Sans', 'Noto Sans SC', sans-serif;
    font-weight: 600;
    font-size: 30px;
    color: var(--text-primary);
    letter-spacing: 0.08em;
    position: relative;
  }

  h1::after {
    content: '';
    position: absolute;
    bottom: -14px;
    left: 50%;
    transform: translateX(-50%);
    width: 76px;
    height: 3px;
    border-radius: 999px;
    background: linear-gradient(90deg, transparent, var(--accent-primary), transparent);
  }

  .card {
    background: var(--surface-1);
    backdrop-filter: blur(18px);
    border: 1px solid var(--border-soft-color);
    border-radius: 20px;
    padding: 28px;
    position: relative;
    box-shadow: var(--shadow-soft);
  }

  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.48);
    pointer-events: none;
  }

  .card-title {
    font-family: 'Josefin Sans', 'Noto Sans SC', sans-serif;
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    color: var(--text-primary);
    letter-spacing: 0.03em;
  }

  .card-title i {
    font-size: 18px;
    color: var(--accent-primary);
  }

  .form-group {
    margin-bottom: 22px;
  }

  .form-group label {
    display: block;
    margin-bottom: 10px;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-secondary);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .form-group input[type="text"],
  .form-group input[type="password"],
  .form-group input[type="number"],
  .form-group input[type="url"],
  .form-group select {
    width: 100%;
    height: 48px;
    padding: 0 16px;
    border: 1px solid var(--border-soft-color);
    border-radius: 14px;
    background: var(--surface-input);
    color: var(--text-primary);
    font-size: 14px;
    outline: none;
    transition: all 0.28s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.6);
  }

  .form-group input::placeholder {
    color: var(--text-muted);
  }

  .form-group input:focus,
  .form-group select:focus {
    border-color: color-mix(in srgb, var(--accent-primary) 36%, transparent);
    box-shadow:
      0 0 0 3px color-mix(in srgb, var(--accent-primary) 10%, transparent),
      inset 0 1px 0 rgba(255, 255, 255, 0.82);
  }

  .form-group .hint,
  .mode-option-desc,
  .subtle-note {
    margin-top: 8px;
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.55;
  }

  .toggle-group {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 0;
    border-bottom: 1px solid color-mix(in srgb, var(--border-soft-color) 75%, transparent);
  }

  .toggle-group:last-child {
    border-bottom: none;
  }

  .toggle-label {
    font-size: 14px;
  }

  .toggle-label div:first-child {
    color: var(--text-primary);
    margin-bottom: 4px;
    font-weight: 500;
  }

  .toggle-label .hint {
    font-size: 12px;
    color: var(--text-muted);
  }

  .toggle-switch {
    position: relative;
    width: 52px;
    height: 30px;
  }

  .toggle-switch input {
    opacity: 0;
    width: 0;
    height: 0;
  }

  .toggle-slider {
    position: absolute;
    cursor: pointer;
    inset: 0;
    background-color: rgba(120, 96, 62, 0.12);
    border: 1px solid var(--border-soft-color);
    transition: all 0.28s cubic-bezier(0.4, 0, 0.2, 1);
    border-radius: 999px;
  }

  .toggle-slider:before {
    position: absolute;
    content: "";
    height: 22px;
    width: 22px;
    left: 3px;
    bottom: 3px;
    background-color: var(--surface-raised);
    transition: all 0.28s cubic-bezier(0.4, 0, 0.2, 1);
    border-radius: 50%;
    box-shadow: var(--shadow-soft);
  }

  .toggle-switch input:checked + .toggle-slider {
    background-color: rgba(111, 139, 61, 0.24);
    border-color: var(--selected-border);
  }

  .toggle-switch input:checked + .toggle-slider:before {
    transform: translateX(22px);
    background-color: var(--accent-primary);
  }

  .btn-group {
    display: flex;
    gap: 14px;
    margin-top: 28px;
  }

  .btn {
    flex: 1;
    padding: 14px 20px;
    border: 1px solid;
    border-radius: 14px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.28s cubic-bezier(0.4, 0, 0.2, 1);
    letter-spacing: 0.03em;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn-primary {
    background: var(--accent-primary);
    border-color: var(--accent-primary);
    color: #fffaf1;
    box-shadow: var(--shadow-soft);
  }

  .btn-primary:hover {
    background: var(--accent-soft);
    border-color: var(--accent-soft);
    color: var(--text-primary);
    transform: translateY(-2px);
    box-shadow: var(--shadow-float);
  }

  .btn-primary:disabled {
    opacity: 0.55;
    cursor: not-allowed;
    transform: none;
  }

  .btn-secondary {
    background: var(--surface-raised);
    border-color: var(--border-soft-color);
    color: var(--text-primary);
  }

  .btn-secondary:hover {
    background: color-mix(in srgb, var(--selected-bg) 64%, var(--surface-raised));
    border-color: var(--selected-border);
    color: var(--selected-text);
  }

  .status-message,
  .test-mode-notice {
    margin-top: 18px;
    padding: 14px 16px;
    border: 1px solid;
    border-radius: 14px;
    font-size: 13px;
    display: none;
  }

  .status-message.show,
  .test-mode-notice.show {
    display: block;
  }

  .status-message.success {
    background: color-mix(in srgb, var(--success-soft) 88%, var(--surface-raised));
    border-color: color-mix(in srgb, var(--success-text) 26%, transparent);
    color: var(--success-text);
  }

  .status-message.error {
    background: color-mix(in srgb, var(--error-soft) 88%, var(--surface-raised));
    border-color: color-mix(in srgb, var(--error-text) 26%, transparent);
    color: var(--error-text);
  }

  .status-message.info,
  .test-mode-notice {
    background: color-mix(in srgb, var(--info-soft) 88%, var(--surface-raised));
    border-color: color-mix(in srgb, var(--info-text) 20%, transparent);
    color: var(--info-text);
  }

  .test-mode-notice i {
    margin-right: 8px;
  }

  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, color-mix(in srgb, var(--accent-primary) 24%, transparent), transparent);
    margin: 24px 0;
  }

  .link-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 16px;
    background: var(--surface-2);
    border: 1px solid var(--border-soft-color);
    border-radius: 14px;
    margin-bottom: 10px;
    font-size: 13px;
    transition: all 0.28s ease;
  }

  .link-item:hover {
    background: color-mix(in srgb, var(--selected-bg) 60%, var(--surface-raised));
    border-color: var(--selected-border);
    transform: translateY(-1px);
  }

  .link-item a {
    color: var(--accent-strong);
    text-decoration: none;
    transition: all 0.28s ease;
  }

  .link-item a:hover {
    color: var(--accent-primary);
    text-decoration: underline;
  }

  .link-item i:first-child {
    color: var(--accent-primary);
  }

  .background-section {
    margin-top: 18px;
  }

  .background-section.hidden {
    display: none;
  }

  .form-group input[type="range"],
  .form-group input[type="file"] {
    width: 100%;
    font-size: 14px;
  }

  .form-group input[type="file"] {
    padding: 12px 0;
    color: var(--text-secondary);
  }

  .mode-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
  }

  .mode-option {
    border: 1px solid var(--border-soft-color);
    border-radius: 16px;
    min-height: 96px;
    padding: 16px 14px;
    cursor: pointer;
    transition: all 0.28s ease;
    background: var(--surface-2);
  }

  .mode-option:hover,
  .mode-option.active {
    border-color: var(--selected-border);
    background: color-mix(in srgb, var(--selected-bg) 64%, var(--surface-raised));
  }

  .mode-option input {
    display: none;
  }

  .mode-option-title {
    color: var(--text-primary);
    margin-bottom: 6px;
    font-size: 14px;
    font-weight: 600;
  }

  .range-row {
    display: grid;
    grid-template-columns: 1fr 56px;
    gap: 12px;
    align-items: center;
  }

  .range-value,
  .file-meta {
    text-align: right;
    color: var(--accent-strong);
    font-size: 12px;
  }

  .file-meta {
    margin-top: 8px;
    text-align: left;
  }

  @media (max-width: 980px) {
    .container {
      max-width: 100%;
    }

    .settings-grid {
      grid-template-columns: 1fr;
    }
  }

  @media (max-width: 720px) {
    body {
      padding-left: 14px;
      padding-right: 14px;
    }

    .card {
      padding: 22px;
    }

    .btn-group {
      flex-direction: column;
    }

    .mode-grid {
      grid-template-columns: 1fr;
    }
  }
  </style>
</head>

<body>
  <!-- Background -->
  <div class="artdeco-bg"></div>
  <div class="artdeco-grid"></div>

  <div class="container">
    <h1>导航插件设置</h1>

    <div class="test-mode-notice" id="test-mode-notice">
      <i class="bi bi-info-circle"></i>
      测试模式已启用，将使用模拟数据。关闭测试模式后可配置飞书连接。
    </div>

    <div class="settings-grid">
      <div class="primary-cards">
        <!-- Feishu config -->
        <div class="card">
          <div class="card-title">
            <i class="bi bi-table"></i>
            飞书多维表格配置
          </div>

          <div class="form-group">
            <label for="app-id">APP_ID *</label>
            <input type="text" id="app-id" placeholder="请输入飞书应用 ID">
            <div class="hint">登录飞书开放平台，在应用凭证中获取</div>
          </div>

          <div class="form-group">
            <label for="app-secret">APP_SECRET *</label>
            <input type="password" id="app-secret" placeholder="请输入飞书应用密钥">
            <div class="hint">请妥善保管，不要泄露给他人</div>
          </div>

          <div class="form-group">
            <label for="app-token">APP_TOKEN (多维表格 Token) *</label>
            <input type="text" id="app-token" placeholder="请输入多维表格 Token">
            <div class="hint">多维表格 URL 中的 app_token 参数</div>
          </div>

          <div class="form-group">
            <label for="table-id">TABLE_ID (表格 ID) *</label>
            <input type="text" id="table-id" placeholder="请输入表格 ID">
            <div class="hint">多维表格 URL 中的表格 ID</div>
          </div>

          <div class="btn-group">
            <button class="btn btn-secondary" id="test-connection-btn">
              <i class="bi bi-plug"></i> 测试连接
            </button>
            <button class="btn btn-primary" id="save-btn">
              <i class="bi bi-check-lg"></i> 保存配置
            </button>
          </div>

          <div class="status-message" id="status-message"></div>
        </div>

        <div class="card">
          <div class="card-title">
            <i class="bi bi-image"></i>
            背景设置
          </div>

          <div class="form-group">
            <label>背景模式</label>
            <div class="mode-grid" id="background-mode-group">
              <label class="mode-option" data-mode="default">
                <input type="radio" name="background-mode" value="default" checked>
                <div class="mode-option-title">默认背景</div>
                <div class="mode-option-desc">保留当前 Art Deco 背景</div>
              </label>
              <label class="mode-option" data-mode="upload">
                <input type="radio" name="background-mode" value="upload">
                <div class="mode-option-title">本地上传</div>
                <div class="mode-option-desc">最稳定，图片保存在浏览器本地</div>
              </label>
              <label class="mode-option" data-mode="url">
                <input type="radio" name="background-mode" value="url">
                <div class="mode-option-title">图片 URL</div>
                <div class="mode-option-desc">适合高级用户使用外部图片链接</div>
              </label>
            </div>
          </div>

          <div class="form-group background-section hidden" id="background-upload-section">
            <label for="background-file">上传图片</label>
            <input type="file" id="background-file" accept="image/*">
            <div class="subtle-note">上传时会自动压缩，默认只保留当前这一张背景图。</div>
            <div class="file-meta" id="background-file-meta">未选择文件</div>
          </div>

          <div class="form-group background-section hidden" id="background-url-section">
            <label for="background-url">图片 URL</label>
            <input type="url" id="background-url" placeholder="https://example.com/background.jpg">
            <div class="subtle-note">请使用可直接访问的图片地址；加载失败会自动回退默认背景。</div>
          </div>

          <div class="form-group">
            <label for="background-size">图片适配</label>
            <select id="background-size">
              <option value="cover">Cover</option>
              <option value="contain">Contain</option>
            </select>
          </div>

          <div class="form-group">
            <label for="background-overlay">遮罩强度</label>
            <div class="range-row">
              <input type="range" id="background-overlay" min="0" max="0.85" step="0.01" value="0.38">
              <div class="range-value" id="background-overlay-value">38%</div>
            </div>
          </div>

          <div class="form-group">
            <label for="background-blur">模糊强度</label>
            <div class="range-row">
              <input type="range" id="background-blur" min="0" max="24" step="1" value="0">
              <div class="range-value" id="background-blur-value">0px</div>
            </div>
          </div>

          <div class="btn-group">
            <button class="btn btn-secondary" id="background-reset-btn">
              <i class="bi bi-arrow-counterclockwise"></i> 恢复默认
            </button>
            <button class="btn btn-primary" id="background-save-btn">
              <i class="bi bi-image"></i> 保存背景
            </button>
          </div>

          <div class="status-message" id="background-status-message"></div>
        </div>

      </div>

      <div class="side-cards">
        <div class="card">
          <div class="card-title">
            <i class="bi bi-bug"></i>
            测试模式
          </div>

          <div class="toggle-group">
            <div class="toggle-label">
              <div>启用测试模式</div>
              <div class="hint">使用模拟数据，无需配置飞书</div>
            </div>
            <label class="toggle-switch">
              <input type="checkbox" id="test-mode-toggle">
              <span class="toggle-slider"></span>
            </label>
          </div>
        </div>

        <div class="card">
          <div class="card-title">
            <i class="bi bi-question-circle"></i>
            配置帮助
          </div>

          <div class="link-item">
            <i class="bi bi-link-45deg"></i>
            <a href="https://open.feishu.cn/" target="_blank">飞书开放平台</a>
          </div>

          <div class="link-item">
            <i class="bi bi-link-45deg"></i>
            <a href="#" id="view-guide-btn">查看配置指南</a>
          </div>

          <div class="link-item">
            <i class="bi bi-github"></i>
            <a href="https://github.com/wubh2012/nav_chrome" target="_blank">GitHub 仓库，欢迎贡献和⭐</a>
          </div>
        </div>

        <!-- Data management -->
        <div class="card">
          <div class="card-title">
            <i class="bi bi-trash"></i>
            数据管理
          </div>

          <div class="btn-group">
            <button class="btn btn-secondary" id="clear-cache-btn">
              <i class="bi bi-trash3"></i> 清除缓存
            </button>
            <button class="btn btn-secondary" id="reset-btn">
              <i class="bi bi-arrow-counterclockwise"></i> 重置所有
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/modules/storage.js"></script>
  <script src="js/modules/theme-manager.js"></script>
  <script src="js/modules/background-config.js"></script>
  <script src="js/modules/background-storage.js"></script>
  <script src="js/modules/feishu-api.js"></script>
  <script src="js/options.js"></script>
</body>

</html>
